<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Đồ Đồng Trường Thơi — Tinh hoa làng nghề Việt</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Be+Vietnam+Pro:wght@300;400;500;600;700&family=Lora:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  :root {
    --ivory:    #f4ede0;
    --ivory-2:  #ece3d1;
    --ivory-3:  #e5d9c0;
    --ink:      #2a1f1a;
    --ink-2:    #4a3a2e;
    --muted:    #8a7761;
    --son:      #8b1e1e;       /* đỏ son */
    --son-deep: #6a1515;
    --bronze:   #6b4423;       /* nâu đồng */
    --bronze-2: #8a5a30;
    --gold:     #c9a961;       /* vàng antique */
    --gold-2:   #b08a3e;
    --line:     rgba(42, 31, 26, 0.14);
    --line-2:   rgba(42, 31, 26, 0.08);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #1a130d; }

  body {
    font-family: 'Be Vietnam Pro', system-ui, sans-serif;
    color: var(--ink);
    min-height: 100vh;
    background:
      radial-gradient(1200px 600px at 20% -10%, #2a1d13 0%, transparent 60%),
      radial-gradient(1000px 500px at 90% 110%, #2a1d13 0%, transparent 60%),
      #140e09;
  }

  /* ── Paper texture helpers ── */
  .paper {
    background-color: var(--ivory);
    background-image:
      radial-gradient(circle at 20% 30%, rgba(139,30,30,0.025) 0, transparent 40%),
      radial-gradient(circle at 80% 70%, rgba(107,68,35,0.04) 0, transparent 45%),
      repeating-linear-gradient(0deg, rgba(107,68,35,0.018) 0 1px, transparent 1px 3px),
      repeating-linear-gradient(90deg, rgba(107,68,35,0.015) 0 1px, transparent 1px 3px);
  }

  /* Dong Son-inspired ornamental border (made from safe CSS primitives) */
  .dongson-border {
    --c: var(--bronze);
    height: 14px;
    background:
      radial-gradient(circle at 7px 7px, var(--c) 0 2px, transparent 2.5px),
      radial-gradient(circle at 7px 7px, transparent 4px, var(--c) 4.5px 5.5px, transparent 6px);
    background-size: 14px 14px;
    background-repeat: repeat-x;
    opacity: 0.55;
  }
  .dongson-rule {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--bronze) 20%, var(--bronze) 80%, transparent);
    opacity: 0.35;
  }

  /* Tiny reusable placeholder aesthetic — striped earthy */
  .ph {
    position: relative;
    background:
      repeating-linear-gradient(45deg,
        rgba(107,68,35,0.14) 0 6px,
        rgba(107,68,35,0.06) 6px 12px);
    color: var(--bronze);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.04em;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 8px;
    overflow: hidden;
  }
  .ph.dark {
    background:
      repeating-linear-gradient(45deg,
        rgba(201,169,97,0.16) 0 6px,
        rgba(201,169,97,0.05) 6px 12px);
    color: var(--gold);
  }

  /* Bronze plaque — a painted bronze look for product art */
  .bronze-art {
    background:
      radial-gradient(ellipse at 30% 20%, rgba(255,220,140,0.25), transparent 55%),
      radial-gradient(ellipse at 70% 80%, rgba(80,40,10,0.5), transparent 60%),
      linear-gradient(135deg, #a87a3a 0%, #8a5a2a 40%, #6a3f18 100%);
    position: relative;
  }
  .bronze-art.red {
    background:
      radial-gradient(ellipse at 30% 20%, rgba(255,180,100,0.2), transparent 55%),
      radial-gradient(ellipse at 70% 80%, rgba(60,10,10,0.5), transparent 60%),
      linear-gradient(135deg, #8a3a20 0%, #6a2010 40%, #4a1008 100%);
  }
  .bronze-art.dark {
    background:
      radial-gradient(ellipse at 30% 20%, rgba(201,169,97,0.35), transparent 55%),
      radial-gradient(ellipse at 70% 80%, rgba(0,0,0,0.6), transparent 60%),
      linear-gradient(135deg, #3a2a1a 0%, #1e140a 60%, #0d0803 100%);
  }
  .bronze-art.gold {
    background:
      radial-gradient(ellipse at 30% 20%, rgba(255,240,180,0.5), transparent 55%),
      radial-gradient(ellipse at 70% 80%, rgba(120,80,20,0.35), transparent 60%),
      linear-gradient(135deg, #d9b865 0%, #b8933f 40%, #8a6a1e 100%);
  }

  /* Frame around the art — various styles */
  .art-frame { padding: var(--p, 10px); border-radius: 4px; }
  .frame-bronze {
    background:
      linear-gradient(135deg, #6a4520 0%, #4a2d14 50%, #6a4520 100%);
    box-shadow:
      inset 0 0 0 1px rgba(0,0,0,0.3),
      inset 0 0 0 2px rgba(201,169,97,0.2),
      0 12px 30px -12px rgba(0,0,0,0.55);
  }
  .frame-gold {
    background: linear-gradient(135deg, #c9a961 0%, #8a6a1e 50%, #c9a961 100%);
    box-shadow:
      inset 0 0 0 1px rgba(0,0,0,0.25),
      0 10px 24px -10px rgba(0,0,0,0.5);
  }
  .frame-dark {
    background: linear-gradient(135deg, #2a1d13 0%, #140e09 50%, #2a1d13 100%);
    box-shadow:
      inset 0 0 0 1px rgba(201,169,97,0.15),
      0 10px 24px -10px rgba(0,0,0,0.55);
  }
  .frame-carved {
    background:
      repeating-linear-gradient(90deg, #5a3818 0 2px, #3e2510 2px 4px),
      linear-gradient(135deg, #6a4520, #3e2510);
    box-shadow:
      inset 0 0 0 2px rgba(201,169,97,0.25),
      0 12px 30px -12px rgba(0,0,0,0.55);
  }

  /* Drum-of-Dong-Son SVG logo mark will be inline */

  /* Hide scrollbars but allow scroll */
  .noscroll::-webkit-scrollbar { display: none; }
  .noscroll { scrollbar-width: none; }

  /* Tweaks panel */
  .tweaks-panel {
    position: fixed; right: 16px; bottom: 16px;
    width: 280px; max-height: 70vh; overflow: auto;
    background: #fffdf7; color: var(--ink);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 14px;
    font-family: 'Be Vietnam Pro', sans-serif;
    font-size: 13px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    z-index: 9999;
  }
  .tweaks-panel h4 {
    margin: 0 0 10px 0;
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 0.02em;
    color: var(--son);
  }
  .tweaks-panel label { display: block; margin: 10px 0 4px; font-size: 11px; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; }
  .tweaks-panel .row { display: flex; gap: 6px; flex-wrap: wrap; }
  .tweaks-panel button {
    font: inherit; padding: 6px 10px;
    border: 1px solid var(--line); background: white; border-radius: 8px;
    cursor: pointer; font-size: 12px;
  }
  .tweaks-panel button.on { background: var(--son); color: white; border-color: var(--son); }

  /* Stage/workspace */
  .stage {
    min-height: 100vh;
    padding: 40px 20px 80px;
    display: flex; flex-direction: column; align-items: center; gap: 60px;
  }
  .stage-heading {
    color: #f4ede0;
    text-align: center;
    max-width: 720px;
    margin: 0 auto;
  }
  .stage-heading .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .stage-heading h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 42px;
    font-weight: 500;
    margin: 0 0 10px;
    letter-spacing: 0.01em;
  }
  .stage-heading p {
    color: rgba(244,237,224,0.6);
    font-size: 14px;
    margin: 0;
    line-height: 1.6;
  }
  .screens-row {
    display: flex; gap: 44px; flex-wrap: wrap;
    justify-content: center; align-items: flex-start;
  }
  .screen-wrap {
    display: flex; flex-direction: column; align-items: center; gap: 14px;
  }
  .screen-label {
    color: var(--gold);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    opacity: 0.8;
  }
  .screen-label b {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    letter-spacing: 0;
    text-transform: none;
    color: #f4ede0;
    font-weight: 500;
    display: block;
    margin-top: 2px;
  }
</style>
</head>
<body>

<div id="root"></div>

<script type="text/babel" src="ios-frame.jsx"></script>

<script type="text/babel" src="app/data.jsx"></script>

<script type="text/babel" src="app/screen-home.jsx"></script>
<script type="text/babel" src="app/screen-category.jsx"></script>
<script type="text/babel" src="app/screen-product.jsx"></script>
<script type="text/babel" src="app/screen-saved.jsx"></script>
<script type="text/babel" src="app/screen-menu.jsx"></script>
<script type="text/babel" src="app/app.jsx"></script>

</body>
</html>
